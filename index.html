<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Owncast Promo & Chat</title>
    <style>
        /* Smooth, modern styling */
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: white; }
        
        #promo-container {
            position: absolute;
            bottom: 20px;
            left: 20px;
            display: flex;
            align-items: center;
            background: rgba(15, 15, 20, 0.9);
            border-radius: 50px;
            padding: 10px 25px 10px 10px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.6);
            transform: translateX(-150%);
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 2px solid #7b68ee; /* Fancy purple accent */
        }
        #promo-container.show { transform: translateX(0); }
        
        #logo { width: 55px; height: 55px; border-radius: 50%; margin-right: 15px; object-fit: cover; }
        
        .text-container { display: flex; flex-direction: column; }
        .title { font-weight: 800; font-size: 18px; color: #7b68ee; text-transform: uppercase; letter-spacing: 0.5px;}
        .subtitle { font-size: 15px; color: #e0e0e0; margin-top: 2px;}

        /* Priority Chat Popup Styling */
        #chat-popup {
            position: absolute;
            bottom: 110px;
            left: 20px;
            background: linear-gradient(135deg, #7b68ee, #4a3b9c);
            padding: 15px 20px;
            border-radius: 12px;
            max-width: 320px;
            box-shadow: 0 4px 15px rgba(123, 104, 238, 0.4);
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.4s ease;
        }
        #chat-popup.show { opacity: 1; transform: translateY(0); }
        .chat-author { font-weight: bold; margin-bottom: 5px; font-size: 15px; color: #fff; }
        .chat-body { font-size: 14px; color: #f0f0f0; line-height: 1.4; }
    </style>
</head>
<body>

<div id="promo-container">
    <img id="logo" src="" alt="Owncast Logo" onerror="this.src='https://owncast.online/images/logo.svg'">
    <div class="text-container">
        <div class="title" id="custom-title">Watch Ad-Free</div>
        <div class="subtitle" id="instance-url">!owncast in chat</div>
    </div>
</div>

<div id="chat-popup">
    <div class="chat-author" id="chat-author">System</div>
    <div class="chat-body" id="chat-body">New priority message!</div>
</div>

<script>
    // 1. Parse URL Parameters
    const params = new URLSearchParams(window.location.search);
    const owncastUrl = params.get('url') || 'https://stream.sleepysyntax.dev';
    const timer = parseInt(params.get('timer')) || 300000; // Default to showing every 5 minutes (300,000ms)
    const customTitle = params.get('title') || 'Watch Ad-Free';

    // 2. Setup the UI dynamically
    document.getElementById('custom-title').innerText = customTitle;
    document.getElementById('instance-url').innerText = owncastUrl.replace(/^https?:\/\//, '');
    
    // Owncast hosts its server logo at /logo by default
    document.getElementById('logo').src = `${owncastUrl}/logo`;

    const promoEl = document.getElementById('promo-container');

    // 3. Promo Animation Loop
    function showPromo() {
        promoEl.classList.add('show');
        setTimeout(() => {
            promoEl.classList.remove('show');
        }, 12000); // Stays on screen for 12 seconds
    }

    // Trigger initial show, then set interval
    setTimeout(showPromo, 5000); 
    setInterval(showPromo, timer);

    // 4. Owncast Priority Chat Websocket Integration
    const chatEl = document.getElementById('chat-popup');
    
    function showChatPopup(author, message) {
        document.getElementById('chat-author').innerText = author;
        document.getElementById('chat-body').innerText = message;
        chatEl.classList.add('show');
        setTimeout(() => {
            chatEl.classList.remove('show');
        }, 8000);
    }

    function connectOwncastChat() {
        // Owncast chat websocket endpoint
        const wsUrl = owncastUrl.replace(/^http/, 'ws') + '/api/chat/ws';
        const ws = new WebSocket(wsUrl);

       ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            if (data.type === 'CHAT') {
                showChatPopup(data.user?.displayName || 'Anonymous', data.body);
            }
        };
        ws.onclose = () => {
            console.log("Owncast WS closed, reconnecting in 5s...");
            setTimeout(connectOwncastChat, 5000);
        };
    }

    // Initialize the websocket connection
    connectOwncastChat();
</script>
</body>
</html>
